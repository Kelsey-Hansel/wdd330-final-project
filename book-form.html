        rel="stylesheet">

<body>
    <header id="page-header">
        <div class="logo">
            <img src="images/find-a-book-logo.png" alt="Book logo">
            <h1><a href="index.html">Your Next Find</a></h1>

        <nav>

            </ul>
        </nav>
    </header>
    <main>
        <h2>Add a Book</h2>
        <div id="spotlight">

        </div>
        <form id="addBook">
            <label for="authorName">Author Name <input type="text" id="authorName" name="authorName" required title="Please enter author name."> </label>
            <label for="bookTitle">Book Title <input type="text" id="bookTitle" name="bookTitle" required title="Please enter book title."> </label>
            <label for="bookGenre">Book Genre <input type="text" id="bookGenre" name="bookGenre" required title="Please enter your book genre."> </label>
            <label for="bookImage">Cover Image Link <input type="text" id="bookImage" name="bookImage" required title="Please enter a link to the cover image."> </label>
            <label for="bookDescription">Short Description <textarea id="bookDescription" rows="4" cols="30" required placeholder="Please enter your favorite author."></textarea> </label>
            
            <input type="submit" id="submit-button" name="submit-button" value="Add Book Spotlight">
        </form>
        <p>Once you submit it, you can view your spotlight on this page.</p>
    </main>
    <footer id="page-footer">&copy;2026 WDD 330 | Your Next Find</footer>
